<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ OpenClaw AI Core - KLAVDIA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #bc13fe;
            --neon-gold: #ffd700;
            --bg-dark: #050510;
            --panel-bg: rgba(10, 15, 30, 0.75);
            --border-color: rgba(0, 243, 255, 0.3);
        }
        
        body {
            background: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            color: #fff;
            height: 100vh;
            width: 100vw;
        }
        
        /* Background & Character */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('klavdia_cyber.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }
        
        /* CRT Scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 11;
        }

        /* HUD Interface */
        .hud-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none; /* Let clicks pass through to interactive elements */
        }
        
        /* Top Navigation Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        
        .nav-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.7);
            padding: 8px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            border-radius: 20px;
        }
        
        .nav-btn.active {
            background: rgba(0, 243, 255, 0.15);
            color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            text-shadow: 0 0 5px var(--neon-blue);
        }
        
        .nav-btn:hover {
            color: #fff;
        }
        
        /* Status Panel (Top Left) */
        .status-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 15px;
            background: var(--panel-bg);
            border-left: 3px solid var(--neon-blue);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 90% 100%, 0 100%);
            width: 220px;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 12px;
            color: rgba(255,255,255,0.8);
        }
        
        .status-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--neon-blue);
        }
        
        .status-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin-top: 2px;
        }
        
        .status-bar-fill {
            height: 100%;
            background: var(--neon-blue);
            width: 100%;
            box-shadow: 0 0 5px var(--neon-blue);
            animation: pulseBar 2s infinite;
        }
        
        @keyframes pulseBar {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        /* Chat/Thought Bubble */
        .comms-bubble {
            position: absolute;
            top: 25%;
            right: 10%;
            width: 280px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid var(--neon-pink);
            padding: 20px;
            backdrop-filter: blur(5px);
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
            animation: float 4s ease-in-out infinite;
        }
        
        .comms-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(188, 19, 254, 0.3);
            padding-bottom: 5px;
            margin-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--neon-pink);
        }
        
        .typing-text {
            font-size: 14px;
            line-height: 1.5;
            color: #fff;
            text-shadow: 0 0 2px rgba(255,255,255,0.5);
        }
        
        /* Holographic Panels (Decorative) */
        .holo-panel {
            position: absolute;
            pointer-events: none;
            opacity: 0.6;
            border: 1px solid rgba(0, 243, 255, 0.2);
            background: rgba(0, 243, 255, 0.02);
        }
        
        .holo-1 {
            bottom: 20%;
            left: 10%;
            width: 200px;
            height: 150px;
            transform: perspective(500px) rotateY(15deg);
        }
        
        .holo-2 {
            top: 30%;
            left: 15%;
            width: 150px;
            height: 100px;
            transform: perspective(500px) rotateY(-10deg);
        }
        
        /* Content Sections (Overlay) */
        .content-overlay {
            position: absolute;
            top: 80px; /* Below nav */
            left: 0;
            width: 100%;
            height: calc(100% - 80px);
            background: rgba(5, 5, 16, 0.95);
            backdrop-filter: blur(10px);
            z-index: 50;
            display: none;
            overflow-y: auto;
            padding: 20px;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .content-overlay.active {
            display: block;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .section-header {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-gold);
            font-size: 24px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--neon-gold);
            padding-bottom: 10px;
            text-transform: uppercase;
        }
        
        /* Skills Grid */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }
        
        .skill-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .skill-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: var(--neon-blue);
            opacity: 0.5;
        }
        
        .skill-card:hover {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        
        .skill-card.installed::before {
            background: #00ff00;
        }
        
        .skill-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            margin-bottom: 5px;
            color: #fff;
        }
        
        .skill-desc {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .scene { background-position: center bottom; }
            .comms-bubble {
                top: auto;
                bottom: 120px;
                right: 5%;
                left: 5%;
                width: 90%;
            }
            .holo-panel { display: none; }
            .status-panel { transform: scale(0.8); origin: top left; }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="scene"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    
    <!-- HUD -->
    <div class="hud-container">
        <!-- Status -->
        <div class="status-panel">
            <div class="status-row">
                <span class="status-label">SYSTEM STATUS</span>
                <span style="color: #00ff00">ONLINE</span>
            </div>
            <div class="status-bar-bg"><div class="status-bar-fill" style="width: 100%"></div></div>
            <div class="status-row" style="margin-top: 10px;">
                <span class="status-label">SKILLS LOADED</span>
                <span>114</span>
            </div>
            <div class="status-bar-bg"><div class="status-bar-fill" style="width: 85%; background: var(--neon-gold); box-shadow: 0 0 5px var(--neon-gold)"></div></div>
            <div class="status-row" style="margin-top: 10px;">
                <span class="status-label">TIME</span>
                <span id="clock">00:00:00</span>
            </div>
        </div>
        
        <!-- Holo Decorations -->
        <div class="holo-panel holo-1"></div>
        <div class="holo-panel holo-2"></div>
        
        <!-- Chat Bubble -->
        <div class="comms-bubble" id="comms">
            <div class="comms-header">
                <span>INCOMING MESSAGE</span>
                <span>CH: MAIN</span>
            </div>
            <div class="typing-text" id="thought-text">
                Системы готовы. Ожидаю указаний.
            </div>
        </div>
    </div>
    
    <!-- Navigation (Interactive) -->
    <nav class="top-bar">
        <button class="nav-btn active" onclick="showSection('main')">CMD CENTER</button>
        <button class="nav-btn" onclick="showSection('skills')">SKILLS DB</button>
        <button class="nav-btn" onclick="showSection('notes')">LOGS</button>
    </nav>
    
    <!-- SKILLS OVERLAY -->
    <div id="skills-section" class="content-overlay">
        <div class="section-header">SKILLS DATABASE</div>
        <div id="skills-container" class="skills-grid"></div>
    </div>
    
    <!-- NOTES OVERLAY -->
    <div id="notes-section" class="content-overlay">
        <div class="section-header">MISSION LOGS</div>
        <textarea style="width: 100%; height: 400px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: #fff; padding: 15px; font-family: 'Rajdhani'; font-size: 16px;" id="notesArea" placeholder="Enter log data..."></textarea>
        <button onclick="saveNotes()" style="margin-top: 10px; background: var(--neon-blue); border: none; padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer;">SAVE LOG</button>
    </div>

    <!-- DATA -->
    <script src="skills_repo_data.js"></script>

    <script>
        // Telegram
        let tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); tg.enableClosingConfirmation(); }
        
        // Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ru-RU');
        }, 1000);
        
        // Navigation
        function showSection(id) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.content-overlay').forEach(el => el.classList.remove('active'));
            
            if (id === 'skills') {
                document.getElementById('skills-section').classList.add('active');
                renderSkills();
            } else if (id === 'notes') {
                document.getElementById('notes-section').classList.add('active');
            } else {
                // Main view - close overlays
            }
        }
        
        // Render Skills
        let skillsRendered = false;
        function renderSkills() {
            if (skillsRendered) return;
            const container = document.getElementById('skills-container');
            const data = (typeof allSkillsFromRepo !== 'undefined') ? allSkillsFromRepo : [];
            const installed = (typeof installedSkillNames !== 'undefined') ? installedSkillNames : [];
            
            data.forEach(skill => {
                const isInstalled = installed.includes(skill.name);
                const card = document.createElement('div');
                card.className = `skill-card ${isInstalled ? 'installed' : ''}`;
                card.innerHTML = `
                    <div class="skill-name" style="${isInstalled ? 'color:#00ff00' : ''}">${isInstalled ? '✅ ' : ''}${skill.name}</div>
                    <div class="skill-desc">${skill.desc || skill.category}</div>
                `;
                card.onclick = () => alert(`${skill.name}\nStatus: ${isInstalled ? 'ACTIVE' : 'AVAILABLE'}`);
                container.appendChild(card);
            });
            skillsRendered = true;
        }
        
        // Notes
        const NOTES_KEY = 'openclaw_logs_v6';
        document.getElementById('notesArea').value = localStorage.getItem(NOTES_KEY) || '';
        function saveNotes() {
            localStorage.setItem(NOTES_KEY, document.getElementById('notesArea').value);
            if(tg) tg.showPopup({message: 'LOG SAVED'});
            else alert('LOG SAVED');
        }
        
        // Thoughts loop
        const phrases = [
            "Сканирую сеть...",
            "Оптимизация процессов 99%",
            "Подключена к базе данных VNVNC",
            "Мониторинг конкурентов активен",
            "Ожидаю ввод данных...",
            "Системы безопасности: НОРМА"
        ];
        let pIndex = 0;
        setInterval(() => {
            pIndex = (pIndex + 1) % phrases.length;
            document.getElementById('thought-text').innerText = phrases[pIndex];
        }, 5000);
        
    </script>
</body>
</html>
