<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦞 OpenClaw Office - Клавдия</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --gold: #D4AF37;
            --gold-light: #F4E4C1;
            --dark: #0a0a0f;
            --dark-light: #1a1a2e;
            --accent: #c44569;
        }
        
        body {
            background: var(--dark);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: #fff;
            height: 100vh;
            width: 100vw;
        }
        
        .app {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        /* Navigation */
        .nav {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .nav-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: var(--gold);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-btn:hover, .nav-btn.active {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
        }
        
        /* Sections */
        .section {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            animation: fadeIn 0.5s ease;
        }
        
        .section.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* ===== OFFICE - REALISTIC ===== */
        .office {
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Main Image */
        .office-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('klavdia.png');
            background-size: cover;
            background-position: center;
            animation: breathe 8s ease-in-out infinite;
            transform-origin: center center;
        }

        /* Breathe animation for image */
        @keyframes breathe {
            0% { transform: scale(1.0); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1.0); }
        }
        
        /* Overlay effects */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
        }

        /* Rain */
        .rain {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAABZJREFUeNpi/P//PwMIMAIx40Qlz2CAAQEA/04Ew2t44u4AAAAASUVORK5CYII=');
            opacity: 0.1;
            animation: rain 0.3s linear infinite;
            pointer-events: none;
        }
        
        @keyframes rain {
            from { background-position: 0 0; }
            to { background-position: -20px 20px; }
        }
        
        /* Thought bubble */
        .thought-bubble {
            position: absolute;
            top: 20%;
            right: 15%;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 25px;
            border-radius: 20px;
            border-bottom-left-radius: 0;
            max-width: 250px;
            color: #1a1a2e;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: float 4s ease-in-out infinite;
            z-index: 20;
            opacity: 0.95;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .thought-label {
            color: #c44569;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        /* Info Panel */
        .info-panel {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 280px;
            z-index: 20;
        }
        
        .info-title {
            color: var(--gold);
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
        
        /* ===== SKILLS & NOTES (Dark theme) ===== */
        .skills, .notes {
            background: #0f0f12;
            padding: 80px 20px 20px;
            overflow-y: auto;
        }
        
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            color: var(--gold);
            text-align: center;
            margin-bottom: 30px;
        }
        
        /* Skills Grid */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .skill-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .skill-card:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
            transform: translateY(-3px);
        }

        .skill-icon { font-size: 24px; display: block; margin-bottom: 10px; }
        .skill-name { font-size: 13px; font-weight: 500; }
        .skill-desc { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 5px; }
        
        .skills-category-header {
            grid-column: 1 / -1;
            margin-top: 20px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: var(--gold);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Notes */
        .notes-container {
            max-width: 800px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .notes-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .notes-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .notes-btn:hover {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
        }
        
        .notes-area {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }
        
        .notes-area:focus {
            border-color: var(--gold);
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .office-bg {
                background-position: center bottom;
                transform-origin: center bottom;
            }
            .thought-bubble {
                top: 15%;
                right: 5%;
                left: 5%;
                max-width: none;
                width: 90%;
            }
            .info-panel {
                bottom: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <nav class="nav">
            <button class="nav-btn active" onclick="showSection('office')">🏢 Офис</button>
            <button class="nav-btn" onclick="showSection('skills')">📚 Скиллы</button>
            <button class="nav-btn" onclick="showSection('notes')">📝 Заметки</button>
        </nav>
        
        <!-- OFFICE -->
        <section id="office" class="section office active">
            <div class="office-bg"></div>
            <div class="rain"></div>
            <div class="overlay"></div>
            
            <div class="thought-bubble" id="thought">
                <div class="thought-label">💭 Мысли</div>
                <div id="thought-text">Привет! Я Клавдия.<br>Твой личный бизнес-ассистент.</div>
            </div>
            
            <div class="info-panel">
                <div class="info-title">🦞 OpenClaw Office</div>
                <div class="info-stat">
                    <span><span class="status-dot"></span>Статус</span>
                    <span>Онлайн</span>
                </div>
                <div class="info-stat">
                    <span>Скиллов</span>
                    <span>114</span>
                </div>
                <div class="info-stat">
                    <span>Время</span>
                    <span id="clock">--:--</span>
                </div>
            </div>
        </section>
        
        <!-- SKILLS -->
        <section id="skills" class="section skills">
            <div class="section-title">📚 Каталог скиллов</div>
            <div class="skills-grid" id="skillsGrid">
                <!-- JS will load skills here -->
            </div>
        </section>
        
        <!-- NOTES -->
        <section id="notes" class="section notes">
            <div class="notes-container">
                <div class="section-title">📝 Заметки</div>
                <div class="notes-toolbar">
                    <button class="notes-btn" onclick="saveNotes()">💾 Сохранить</button>
                    <button class="notes-btn" onclick="clearNotes()">🗑 Очистить</button>
                </div>
                <textarea class="notes-area" id="notesArea" placeholder="Пиши сюда идеи..."></textarea>
            </div>
        </section>
    </div>
    
    <!-- SKILLS DATA -->
    <script src="skills_repo_data.js"></script>
    
    <script>
        // Telegram
        let tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }
        
        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();
        
        // Navigation
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
            
            if(id === 'skills') loadSkills();
        }
        
        // Thoughts rotation
        const thoughts = [
            "Анализирую данные... 📊",
            "Готова к новым задачам! 💼",
            "Проверяю отчёты Яндекс.Директ 📉",
            "Мониторю конкурентов 👀",
            "Всё под контролем 👌",
            "Жду твоих указаний ⌨️"
        ];
        let tIndex = 0;
        setInterval(() => {
            tIndex = (tIndex + 1) % thoughts.length;
            document.getElementById('thought-text').innerHTML = thoughts[tIndex];
        }, 8000);
        
        // Skills Loader
        function loadSkills() {
            const grid = document.getElementById('skillsGrid');
            if(grid.children.length > 0) return;
            
            // Используем данные из skills_repo_data.js (если есть) или фолбек
            const data = (typeof allSkillsFromRepo !== 'undefined') ? allSkillsFromRepo : [];
            const installed = (typeof installedSkillNames !== 'undefined') ? installedSkillNames : [];
            
            // Group
            const groups = {};
            data.forEach(s => {
                if(!groups[s.category]) groups[s.category] = [];
                groups[s.category].push(s);
            });
            
            // Render
            // 1. Installed
            const instHeader = document.createElement('div');
            instHeader.className = 'skills-category-header';
            instHeader.innerHTML = '✅ УСТАНОВЛЕНЫ';
            instHeader.style.color = '#2ecc71';
            grid.appendChild(instHeader);
            
            data.filter(s => installed.includes(s.name)).forEach(s => {
                grid.appendChild(createCard(s, true));
            });
            
            // 2. Others by category
            Object.keys(groups).forEach(cat => {
                const catHeader = document.createElement('div');
                catHeader.className = 'skills-category-header';
                catHeader.textContent = cat;
                grid.appendChild(catHeader);
                
                groups[cat].forEach(s => {
                    if(!installed.includes(s.name)) {
                        grid.appendChild(createCard(s, false));
                    }
                });
            });
        }
        
        function createCard(skill, isInstalled) {
            const el = document.createElement('div');
            el.className = 'skill-card';
            if(isInstalled) el.style.borderColor = '#2ecc71';
            
            el.innerHTML = `
                <span class="skill-icon">${skill.icon || '📦'}</span>
                <div class="skill-name">${skill.name}</div>
                <div class="skill-desc">${skill.desc || ''}</div>
            `;
            el.onclick = () => alert(skill.name + (isInstalled ? " (Установлен)" : " (Доступен)"));
            return el;
        }
        
        // Notes
        const NOTES_KEY = 'openclaw_notes_v5';
        document.getElementById('notesArea').value = localStorage.getItem(NOTES_KEY) || '';
        function saveNotes() {
            localStorage.setItem(NOTES_KEY, document.getElementById('notesArea').value);
            alert('Сохранено! ✅');
        }
        function clearNotes() {
            if(confirm('Точно очистить?')) {
                document.getElementById('notesArea').value = '';
                localStorage.removeItem(NOTES_KEY);
            }
        }
    </script>
</body>
</html>
