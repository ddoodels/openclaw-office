<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KLAVDIA AI | Офис</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00aa;
            --neon-gold: #ffd700;
            --glass: rgba(0, 0, 0, 0.6);
            --success: #00ff88;
            --warning: #ffaa00;
        }
        
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        .app {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        /* Background */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('klavdia_mobile_v8.png');
            background-size: cover;
            background-position: center top;
            z-index: 0;
        }
        
        /* Interactive Hotspots */
        .hotspot {
            position: absolute;
            z-index: 10;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .hotspot::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,243,255,0.3) 0%, transparent 70%);
            animation: pulse 2s infinite;
        }
        
        .hotspot::after {
            content: attr(data-label);
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .hotspot:hover::after, .hotspot:active::after {
            opacity: 1;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
        
        .hotspot-door { left: 5%; top: 35%; width: 60px; height: 120px; }
        .hotspot-window { right: 10%; top: 25%; width: 80px; height: 100px; }
        .hotspot-desk { left: 30%; bottom: 20%; width: 100px; height: 60px; }
        .hotspot-regen { right: 5%; top: 5%; width: 50px; height: 50px; background: rgba(255,0,170,0.2); border: 2px solid var(--neon-pink); }
        .hotspot-regen::before { background: radial-gradient(circle, rgba(255,0,170,0.4) 0%, transparent 70%); }
        .hotspot-regen::after { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
        
        /* Thought bubble */
        .thought-bubble {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,243,255,0.3);
            border-radius: 20px;
            padding: 15px 20px;
            max-width: 80%;
            z-index: 20;
            animation: float 3s ease-in-out infinite;
        }
        
        .thought-label { font-family: 'Orbitron', sans-serif; font-size: 10px; color: var(--neon-blue); margin-bottom: 5px; text-transform: uppercase; }
        .thought-text { font-size: 14px; line-height: 1.4; color: #fff; }
        
        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }
        
        /* Bottom Navigation */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(70px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 10px;
            z-index: 100;
        }
        
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-btn.active { color: var(--neon-blue); }
        .nav-btn svg { width: 24px; height: 24px; fill: currentColor; }
        
        /* Overlay Sections */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 50;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        .overlay.active { transform: translateY(0); }
        
        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-top: env(safe-area-inset-top);
        }
        
        .overlay-title { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--neon-gold); }
        
        .close-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }
        
        /* Skills Marketplace Styles */
        .skills-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .skills-tab {
            flex-shrink: 0;
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .skills-tab.active {
            background: rgba(0, 243, 255, 0.15);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }
        
        .skills-category-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,0,170,0.3);
        }
        
        .skills-category-title.installed {
            color: var(--success);
            border-color: rgba(0,255,136,0.3);
        }
        
        .skill-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .skill-card:active { transform: scale(0.98); }
        
        .skill-card.installed {
            border-color: rgba(0,255,136,0.3);
            background: rgba(0,255,136,0.05);
        }
        
        .skill-card.installed::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--success);
        }
        
        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        
        .skill-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        
        .skill-card.installed .skill-name {
            color: var(--success);
        }
        
        .skill-badge {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 12px;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .skill-badge.installed {
            background: rgba(0,255,136,0.15);
            color: var(--success);
        }
        
        .skill-badge.available {
            background: rgba(255,170,0,0.15);
            color: var(--warning);
        }
        
        .skill-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            line-height: 1.4;
            margin-bottom: 12px;
        }
        
        .skill-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .skill-meta {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
        
        .skill-install-btn {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            color: #000;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .skill-install-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        
        .skill-install-btn:disabled {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.4);
            cursor: default;
        }
        
        /* Search bar */
        .skills-search {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 15px;
            margin-bottom: 15px;
            outline: none;
        }
        
        .skills-search::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .skills-search:focus {
            border-color: var(--neon-blue);
        }
        
        /* Notes */
        .notes-input {
            width: 100%;
            min-height: 200px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
        }
        
        .save-btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: var(--neon-blue);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Background -->
        <div class="scene"></div>
        
        <!-- Hotspots -->
        <div class="hotspot hotspot-door" data-label="Скиллы" onclick="openSection('skills')"></div>
        <div class="hotspot hotspot-window" data-label="Логи" onclick="openSection('notes')"></div>
        <div class="hotspot hotspot-desk" data-label="Работа" onclick="regenerateOffice()"></div>
        <div class="hotspot hotspot-regen" data-label="Новый фон" onclick="regenerateOffice()">🔄</div>
        
        <!-- Thought Bubble -->
        <div class="thought-bubble">
            <div class="thought-label">💭 Мысли Клавдии</div>
            <div class="thought-text" id="thought-text">Системы активны. Жду указаний...</div>
        </div>
        
        <!-- Bottom Nav -->
        <nav class="nav">
            <button class="nav-btn active" onclick="closeAll()">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>Офис</span>
            </button>
            <button class="nav-btn" onclick="openSection('skills')">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>Скиллы</span>
            </button>
            <button class="nav-btn" onclick="openSection('notes')">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg>
                <span>Заметки</span>
            </button>
        </nav>
        
        <!-- SKILLS MARKETPLACE OVERLAY -->
        <div class="overlay" id="skills-overlay">
            <div class="overlay-header">
                <div class="overlay-title">🛒 МАГАЗИН СКИЛЛОВ</div>
                <button class="close-btn" onclick="closeAll()">✕</button>
            </div>
            
            <!-- Search -->
            <input type="text" class="skills-search" placeholder="🔍 Поиск скиллов..." id="skillSearch" onkeyup="filterSkills()">
            
            <!-- Tabs -->
            <div class="skills-tabs">
                <button class="skills-tab active" onclick="switchTab('all')" id="tab-all">Все</button>
                <button class="skills-tab" onclick="switchTab('installed')" id="tab-installed">✅ Установлены</button>
                <button class="skills-tab" onclick="switchTab('available')" id="tab-available">📦 Доступны</button>
            </div>
            
            <!-- Skills List -->
            <div id="skills-list">
                <!-- Filled by JavaScript -->
            </div>
        </div>
        
        <!-- NOTES OVERLAY -->
        <div class="overlay" id="notes-overlay">
            <div class="overlay-header">
                <div class="overlay-title">📝 ЗАМЕТКИ</div>
                <button class="close-btn" onclick="closeAll()">✕</button>
            </div>
            <div class="tg-list" id="logs-list">
                <div class="tg-item">
                    <div class="tg-item-icon">📋</div>
                    <div class="tg-item-content">
                        <div class="tg-item-title">Новая заметка</div>
                        <div class="tg-item-subtitle">Добавить запись</div>
                    </div>
                </div>
            </div>
            <textarea class="notes-input" id="log-input" placeholder="Введите текст..." rows="3"></textarea>
            <button class="save-btn" onclick="saveNotes()">Сохранить</button>
        </div>
    </div>
    
    <!-- DATA -->
    <script src="skills_repo_data.js"></script>
    
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        // Thoughts rotation
        const thoughts = [
            "Анализирую данные VNVNC...",
            "Проверяю рекламные кампании 📉",
            "Мониторю конкурентов 👀",
            "Все системы работают нормально ✅",
            "Нужно обновить отчёт по метрикам",
            "Готова к новым задачам! ⚡"
        ];
        let tIndex = 0;
        setInterval(() => {
            tIndex = (tIndex + 1) % thoughts.length;
            document.getElementById('thought-text').textContent = thoughts[tIndex];
        }, 6000);
        
        // Navigation
        let currentTab = 'all';
        
        function openSection(section) {
            if (section === 'skills') {
                document.getElementById('skills-overlay').classList.add('active');
                renderSkills();
            } else if (section === 'notes') {
                document.getElementById('notes-overlay').classList.add('active');
            }
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget?.classList?.add('active');
        }
        
        function closeAll() {
            document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.nav-btn').classList.add('active');
        }
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.skills-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            renderSkills();
        }
        
        // Skills data with local additions
        const localSkills = [
            {
                name: "yandex-unified-analytics",
                icon: "📊",
                desc: "Комплексная аналитика: Директ + Метрика + Бизнес. Два режима: для маркетолога и учредителя.",
                category: "Аналитика",
                installed: true,
                version: "2.0",
                author: "VNVNC Team"
            },
            {
                name: "yandex-direct-browser",
                icon: "🔍",
                desc: "Доступ к Яндекс.Директ через браузер без API-токенов.",
                category: "Аналитика", 
                installed: true,
                version: "1.0",
                author: "OpenClaw"
            }
        ];
        
        function renderSkills() {
            const container = document.getElementById('skills-list');
            container.innerHTML = '';
            
            // Combine repo skills with local
            const data = (typeof allSkillsFromRepo !== 'undefined') ? allSkillsFromRepo : [];
            const installed = (typeof installedSkillNames !== 'undefined') ? installedSkillNames : [];
            
            // Mark installed from repo
            data.forEach(skill => {
                skill.installed = installed.includes(skill.name);
            });
            
            // Add local skills
            const allSkills = [...localSkills, ...data.filter(s => !localSkills.find(ls => ls.name === s.name))];
            
            // Filter by tab
            let filtered = allSkills;
            if (currentTab === 'installed') {
                filtered = allSkills.filter(s => s.installed);
            } else if (currentTab === 'available') {
                filtered = allSkills.filter(s => !s.installed);
            }
            
            // Filter by search
            const search = document.getElementById('skillSearch')?.value?.toLowerCase() || '';
            if (search) {
                filtered = filtered.filter(s => 
                    s.name.toLowerCase().includes(search) || 
                    (s.desc && s.desc.toLowerCase().includes(search))
                );
            }
            
            // Group by category
            const groups = {};
            filtered.forEach(s => {
                const cat = s.installed ? '✅ УСТАНОВЛЕНЫ' : (s.category || '📦 ДОСТУПНЫ');
                if (!groups[cat]) groups[cat] = [];
                groups[cat].push(s);
            });
            
            // Render
            Object.keys(groups).forEach(cat => {
                const header = document.createElement('div');
                header.className = 'skills-category-title' + (cat.includes('УСТАНОВЛЕНЫ') ? ' installed' : '');
                header.textContent = cat + ` (${groups[cat].length})`;
                container.appendChild(header);
                
                groups[cat].forEach(skill => {
                    container.appendChild(createSkillCard(skill));
                });
            });
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:40px;">Ничего не найдено</div>';
            }
        }
        
        function createSkillCard(skill) {
            const card = document.createElement('div');
            card.className = 'skill-card' + (skill.installed ? ' installed' : '');
            
            const badgeClass = skill.installed ? 'installed' : 'available';
            const badgeText = skill.installed ? '✓ Установлен' : '📦 Установить';
            
            card.innerHTML = `
                <div class="skill-header">
                    <div class="skill-name">${skill.icon || '📦'} ${skill.name}</div>
                    <span class="skill-badge ${badgeClass}">${badgeText}</span>
                </div>
                <div class="skill-desc">${skill.desc || 'Нет описания'}</div>
                <div class="skill-footer">
                    <div class="skill-meta">
                        ${skill.category || 'General'} ${skill.version ? '• v' + skill.version : ''}
                    </div>
                    ${!skill.installed ? 
                        `<button class="skill-install-btn" onclick="installSkill('${skill.name}', event)">Установить</button>` :
                        `<button class="skill-install-btn" disabled>✓ Установлен</button>`
                    }
                </div>
            `;
            
            card.onclick = (e) => {
                if (!e.target.classList.contains('skill-install-btn')) {
                    showSkillDetails(skill);
                }
            };
            
            return card;
        }
        
        function installSkill(name, event) {
            event.stopPropagation();
            const btn = event.target;
            btn.textContent = '⏳ Установка...';
            btn.disabled = true;
            
            // Simulate installation
            setTimeout(() => {
                // Add to local installed
                const skill = localSkills.find(s => s.name === name);
                if (skill) skill.installed = true;
                
                btn.textContent = '✓ Установлен';
                btn.style.background = 'rgba(0,255,136,0.3)';
                
                if (tg) tg.showAlert(`✅ Скилл "${name}" установлен!`);
                else alert(`✅ Скилл "${name}" установлен!`);
                
                // Refresh list
                setTimeout(renderSkills, 500);
            }, 1500);
        }
        
        function showSkillDetails(skill) {
            const info = `
📦 ${skill.name}

${skill.desc || 'Нет описания'}

Категория: ${skill.category || 'General'}
${skill.version ? 'Версия: ' + skill.version : ''}
${skill.author ? 'Автор: ' + skill.author : ''}

Статус: ${skill.installed ? '✅ Установлен' : '📦 Доступен для установки'}
            `;
            
            if (tg) {
                tg.showPopup({
                    title: skill.name,
                    message: info,
                    buttons: skill.installed ? 
                        [{id: 'ok', type: 'ok'}] :
                        [{id: 'install', type: 'default', text: 'Установить'}, {id: 'cancel', type: 'cancel'}]
                }, (btn) => {
                    if (btn === 'install') {
                        // Trigger install
                        renderSkills();
                    }
                });
            } else {
                alert(info);
            }
        }
        
        function filterSkills() {
            renderSkills();
        }
        
        function regenerateOffice() {
            if (tg) {
                tg.showPopup({
                    title: 'Генерация фона',
                    message: 'Создать новое изображение офиса?',
                    buttons: [
                        {id: 'yes', type: 'default', text: 'Да'},
                        {id: 'no', type: 'cancel', text: 'Отмена'}
                    ]
                });
            }
        }
        
        function saveNotes() {
            if (tg) tg.showAlert('✅ Сохранено!');
            else alert('Сохранено!');
        }
    </script>
</body>
</html>
