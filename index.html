<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <title>KLAVDIA AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        
        :root {
            --tg-bg: var(--tg-theme-bg-color, #0a0a0f);
            --tg-text: var(--tg-theme-text-color, #ffffff);
            --tg-hint: var(--tg-theme-hint-color, #7a7a8c);
            --tg-link: var(--tg-theme-link-color, #00f3ff);
            --tg-button: var(--tg-theme-button-color, #00f3ff);
            --tg-button-text: var(--tg-theme-button-text-color, #000000);
            --tg-secondary: var(--tg-theme-secondary-bg-color, #1a1a2e);
            
            --neon-blue: #00f3ff;
            --neon-pink: #bc13fe;
            --neon-gold: #ffd700;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--tg-bg);
            color: var(--tg-text);
            font-family: 'Rajdhani', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        /* Safe areas for notched phones */
        .safe-area {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        
        /* Main container */
        .app {
            width: 100%;
            height: var(--tg-viewport-height, 100vh);
            position: relative;
            overflow: hidden;
        }
        
        /* Background Scene */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('klavdia_cyber.png');
            background-size: cover;
            background-position: center top;
            z-index: 0;
        }
        
        /* Telegram-style blur overlay */
        .tg-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: calc(60px + env(safe-area-inset-top));
            background: rgba(var(--tg-theme-bg-color-rgb, 10, 10, 15), 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            padding-bottom: 10px;
            padding-left: 16px;
            padding-right: 16px;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }
        
        .tg-header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        /* Bottom navigation - Telegram style */
        .tg-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(70px + env(safe-area-inset-bottom));
            background: rgba(var(--tg-theme-bg-color-rgb, 10, 10, 15), 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255,255,255,0.1);
            z-index: 100;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 8px;
        }
        
        .tg-nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: none;
            border: none;
            color: var(--tg-hint);
            font-size: 10px;
            font-family: inherit;
            transition: color 0.2s;
            cursor: pointer;
        }
        
        .tg-nav-btn.active {
            color: var(--tg-link);
        }
        
        .tg-nav-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        
        /* Main content area */
        .content {
            position: absolute;
            top: calc(60px + env(safe-area-inset-top));
            bottom: calc(70px + env(safe-area-inset-bottom));
            left: 0;
            right: 0;
            overflow: hidden;
        }
        
        /* HUD Overlay */
        .hud {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* Status card - Telegram style bubble */
        .status-card {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(var(--tg-theme-secondary-bg-color-rgb, 26, 26, 46), 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 16px;
            min-width: 140px;
            pointer-events: auto;
            border: 0.5px solid rgba(255,255,255,0.1);
            animation: slideIn 0.4s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 6px;
        }
        
        .status-row:last-child { margin-bottom: 0; }
        
        .status-label {
            color: var(--tg-hint);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
        }
        
        .online-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #00ff88;
        }
        
        .online-dot {
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 6px #00ff88;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }
        
        /* Message bubble - Telegram style */
        .message-bubble {
            position: absolute;
            bottom: 100px;
            right: 16px;
            left: 16px;
            max-width: 400px;
            margin-left: auto;
            background: var(--tg-secondary);
            border-radius: 20px;
            border-bottom-right-radius: 4px;
            padding: 14px 16px;
            pointer-events: auto;
            animation: messageIn 0.3s ease;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        
        @keyframes messageIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        
        .message-sender {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--neon-pink);
            font-weight: 600;
        }
        
        .message-time {
            font-size: 11px;
            color: var(--tg-hint);
        }
        
        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }
        
        /* Sections (Skills, Logs) */
        .section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--tg-bg);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 50;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }
        
        .section.active {
            transform: translateY(0);
        }
        
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--neon-gold);
        }
        
        /* Telegram-style list */
        .tg-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .tg-item {
            background: var(--tg-secondary);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .tg-item:active {
            background: rgba(255,255,255,0.1);
        }
        
        .tg-item-icon {
            width: 40px;
            height: 40px;
            background: rgba(var(--tg-theme-link-color-rgb, 0, 243, 255), 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .tg-item-content {
            flex: 1;
        }
        
        .tg-item-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .tg-item-subtitle {
            font-size: 13px;
            color: var(--tg-hint);
        }
        
        .tg-item-badge {
            background: var(--neon-blue);
            color: #000;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 10px;
        }
        
        /* Input area */
        .input-area {
            position: sticky;
            bottom: 0;
            margin: 0 -16px;
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: var(--tg-bg);
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }
        
        .tg-input {
            width: 100%;
            background: var(--tg-secondary);
            border: none;
            border-radius: 22px;
            padding: 12px 18px;
            color: var(--tg-text);
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }
        
        .tg-input::placeholder {
            color: var(--tg-hint);
        }
        
        /* Scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.03;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.1) 2px,
                rgba(0,0,0,0.1) 4px
            );
        }
        
        /* Touch feedback */
        @media (hover: none) {
            .tg-item:active {
                transform: scale(0.98);
            }
            .tg-nav-btn:active {
                transform: scale(0.9);
            }
        }
    </style>
</head>
<body>
    <!-- Telegram Safe Area Wrapper -->
    <div class="app" id="app">
        
        <!-- Header -->
        <div class="tg-header">
            <div class="tg-header-title">⚡ KLAVDIA AI</div>
        </div>
        
        <!-- Scanlines -->
        <div class="scanlines"></div>
        
        <!-- Main Content -->
        <div class="content" id="main-content">
            <!-- Background -->
            <div class="scene"></div>
            
            <!-- HUD -->
            <div class="hud">
                <!-- Status Card -->
                <div class="status-card">
                    <div class="status-row">
                        <span class="status-label">Статус</span>
                        <span class="online-indicator">
                            <span class="online-dot"></span>
                            Online
                        </span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Скиллов</span>
                        <span class="status-value">114</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Время</span>
                        <span class="status-value" id="clock">--:--</span>
                    </div>
                </div>
                
                <!-- Message Bubble -->
                <div class="message-bubble" id="message-bubble">
                    <div class="message-header">
                        <span class="message-sender">KLAVDIA</span>
                        <span class="message-time" id="msg-time">--:-->/span>
                    </div>
                    <div class="message-text" id="message-text">
                        Системы активны. Готова к работе.
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Skills Section -->
        <div class="section" id="skills-section">
            <div class="section-title">📚 Скиллы</div>
            <div class="tg-list" id="skills-list">
                <!-- Loaded via JS -->
            </div>
        </div>
        
        <!-- Logs Section -->
        <div class="section" id="logs-section">
            <div class="section-title">📝 Логи</div>
            <div class="tg-list" id="logs-list">
                <div class="tg-item">
                    <div class="tg-item-icon">📋</div>
                    <div class="tg-item-content">
                        <div class="tg-item-title">Новая заметка</div>
                        <div class="tg-item-subtitle">Добавить запись</div>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <textarea class="tg-input" id="log-input" placeholder="Введите текст..." rows="3"></textarea>
            </div>
        </div>
        
        <!-- Bottom Navigation -->
        <nav class="tg-nav">
            <button class="tg-nav-btn active" onclick="showTab('main')">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>Офис</span>
            </button>
            <button class="tg-nav-btn" onclick="showTab('skills')">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>Скиллы</span>
            </button>
            <button class="tg-nav-btn" onclick="showTab('logs')">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                <span>Логи</span>
            </button>
        </nav>
    </div>
    
    <!-- DATA -->
    <script src="skills_repo_data.js"></script>
    
    <script>
        // Telegram WebApp
        const tg = window.Telegram.WebApp;
        
        // Initialize
        tg.ready();
        tg.expand();
        
        // Set colors to match theme
        tg.setHeaderColor('#0a0a0f');
        tg.setBackgroundColor('#0a0a0f');
        
        // Handle viewport changes
        tg.onEvent('viewportChanged', () => {
            document.documentElement.style.setProperty('--tg-viewport-height', tg.viewportHeight + 'px');
        });
        document.documentElement.style.setProperty('--tg-viewport-height', tg.viewportHeight + 'px');
        
        // Haptic feedback helper
        function haptic(type = 'light') {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred(type);
            }
        }
        
        // Clock
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('clock').textContent = time;
            document.getElementById('msg-time').textContent = time;
        }
        setInterval(updateClock, 1000);
        updateClock();
        
        // Navigation
        let currentTab = 'main';
        function showTab(tab) {
            if (tab === currentTab) return;
            
            haptic('light');
            currentTab = tab;
            
            // Update nav buttons
            document.querySelectorAll('.tg-nav-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Show/hide sections
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'skills') {
                document.getElementById('skills-section').classList.add('active');
                loadSkills();
            } else if (tab === 'logs') {
                document.getElementById('logs-section').classList.add('active');
            } else {
                // Main - show background
                document.getElementById('main-content').style.display = 'block';
            }
        }
        
        // Skills loader
        let skillsLoaded = false;
        function loadSkills() {
            if (skillsLoaded) return;
            
            const data = (typeof allSkillsFromRepo !== 'undefined') ? allSkillsFromRepo : [];
            const installed = (typeof installedSkillNames !== 'undefined') ? installedSkillNames : [];
            const list = document.getElementById('skills-list');
            
            data.slice(0, 20).forEach(skill => { // Limit for perf
                const isInstalled = installed.includes(skill.name);
                const item = document.createElement('div');
                item.className = 'tg-item';
                item.innerHTML = `
                    <div class="tg-item-icon" style="background: ${isInstalled ? 'rgba(0,255,136,0.15)' : ''}">${skill.icon || '📦'}</div>
                    <div class="tg-item-content">
                        <div class="tg-item-title">${skill.name}</div>
                        <div class="tg-item-subtitle">${skill.category || 'General'}</div>
                    </div>
                    ${isInstalled ? '<span class="tg-item-badge">✓</span>' : ''}
                `;
                item.onclick = () => {
                    haptic('medium');
                    tg.showPopup({
                        title: skill.name,
                        message: skill.desc || 'No description',
                        buttons: [{id: 'ok', type: 'ok'}]
                    });
                };
                list.appendChild(item);
            });
            
            skillsLoaded = true;
        }
        
        // Message rotation
        const messages = [
            "Мониторю системы...",
            "Все процессы активны",
            "Жду указаний",
            "Анализирую данные",
            "Готова к работе"
        ];
        let msgIndex = 0;
        setInterval(() => {
            msgIndex = (msgIndex + 1) % messages.length;
            const bubble = document.getElementById('message-text');
            bubble.style.opacity = '0';
            setTimeout(() => {
                bubble.textContent = messages[msgIndex];
                bubble.style.opacity = '1';
            }, 200);
        }, 6000);
        
        // Back button handling
        tg.BackButton.onClick(() => {
            if (currentTab !== 'main') {
                showTab('main');
                document.querySelectorAll('.tg-nav-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector('.tg-nav-btn').classList.add('active');
            }
        });
    </script>
</body>
</html>
