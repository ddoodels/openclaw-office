<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KLAVDIA AI | Офис</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00aa;
            --neon-gold: #ffd700;
            --glass: rgba(0, 0, 0, 0.6);
        }
        
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        .app {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        /* Background */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('klavdia_mobile_v8.png');
            background-size: cover;
            background-position: center top;
            z-index: 0;
        }
        
        /* Interactive Hotspots */
        .hotspot {
            position: absolute;
            z-index: 10;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .hotspot::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,243,255,0.3) 0%, transparent 70%);
            animation: pulse 2s infinite;
        }
        
        .hotspot::after {
            content: attr(data-label);
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .hotspot:hover::after, .hotspot:active::after {
            opacity: 1;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
        
        /* Door - left side */
        .hotspot-door {
            left: 5%;
            top: 35%;
            width: 60px;
            height: 120px;
        }
        
        /* Window - right side */
        .hotspot-window {
            right: 10%;
            top: 25%;
            width: 80px;
            height: 100px;
        }
        
        /* Desk - bottom center */
        .hotspot-desk {
            left: 30%;
            bottom: 20%;
            width: 100px;
            height: 60px;
        }
        
        /* Regenerate - top right */
        .hotspot-regen {
            right: 5%;
            top: 5%;
            width: 50px;
            height: 50px;
            background: rgba(255,0,170,0.2);
            border: 2px solid var(--neon-pink);
        }
        
        .hotspot-regen::before {
            background: radial-gradient(circle, rgba(255,0,170,0.4) 0%, transparent 70%);
        }
        
        .hotspot-regen::after {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }
        
        /* Thought bubble */
        .thought-bubble {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,243,255,0.3);
            border-radius: 20px;
            padding: 15px 20px;
            max-width: 80%;
            z-index: 20;
            animation: float 3s ease-in-out infinite;
        }
        
        .thought-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: rgba(0,243,255,0.3) transparent transparent;
        }
        
        .thought-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--neon-blue);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .thought-text {
            font-size: 14px;
            line-height: 1.4;
            color: #fff;
        }
        
        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }
        
        /* Bottom Navigation */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(70px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 10px;
            z-index: 100;
        }
        
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-btn.active {
            color: var(--neon-blue);
        }
        
        .nav-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        
        /* Overlay Sections */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 50;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        .overlay.active {
            transform: translateY(0);
        }
        
        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-top: env(safe-area-inset-top);
        }
        
        .overlay-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: var(--neon-gold);
        }
        
        .close-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }
        
        /* Skills Categories */
        .category-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,0,170,0.3);
        }
        
        .category-title.installed {
            color: #00ff88;
            border-color: rgba(0,255,136,0.3);
        }
        
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .skill-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .skill-card.installed {
            border-color: #00ff88;
            background: rgba(0,255,136,0.05);
        }
        
        .skill-card:active {
            transform: scale(0.95);
        }
        
        .skill-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .skill-desc {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }
        
        /* Notes */
        .notes-input {
            width: 100%;
            min-height: 200px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
        }
        
        .save-btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: var(--neon-blue);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Background -->
        <div class="scene"></div>
        
        <!-- Hotspots -->
        <div class="hotspot hotspot-door" data-label="Скиллы" onclick="openSection('skills')"></div>
        <div class="hotspot hotspot-window" data-label="Логи" onclick="openSection('notes')"></div>
        <div class="hotspot hotspot-desk" data-label="Работа" onclick="regenerateOffice()"></div>
        <div class="hotspot hotspot-regen" data-label="Новый фон" onclick="regenerateOffice()">🔄</div>
        
        <!-- Thought Bubble -->
        <div class="thought-bubble">
            <div class="thought-label">💭 Мысли Клавдии</div>
            <div class="thought-text" id="thought-text">Системы активны. Жду указаний...</div>
        </div>
        
        <!-- Bottom Nav -->
        <nav class="nav">
            <button class="nav-btn active" onclick="closeAll()">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>Офис</span>
            </button>
            <button class="nav-btn" onclick="openSection('skills')">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>Скиллы</span>
            </button>
            <button class="nav-btn" onclick="openSection('notes')">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg>
                <span>Заметки</span>
            </button>
        </nav>
        
        <!-- Skills Overlay -->
        <div class="overlay" id="skills-overlay">
            <div class="overlay-header">
                <div class="overlay-title">📚 БАЗА СКИЛЛОВ</div>
                <button class="close-btn" onclick="closeAll()">✕</button>
            </div>
            <div id="skills-content"></div>
        </div>
        
        <!-- Notes Overlay -->
        <div class="overlay" id="notes-overlay">
            <div class="overlay-header">
                <div class="overlay-title">📝 ЗАМЕТКИ</div>
                <button class="close-btn" onclick="closeAll()">✕</button>
            </div>
            <textarea class="notes-input" id="notes-area" placeholder="Введите заметку..."></textarea>
            <button class="save-btn" onclick="saveNotes()">Сохранить</button>
        </div>
    </div>
    
    <script src="skills_repo_data.js"></script>
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        // Haptic
        function haptic(type = 'light') {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred(type);
        }
        
        // Section navigation
        function openSection(section) {
            haptic('medium');
            document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            if (section === 'skills') {
                document.getElementById('skills-overlay').classList.add('active');
                renderSkills();
            } else if (section === 'notes') {
                document.getElementById('notes-overlay').classList.add('active');
            }
        }
        
        function closeAll() {
            haptic('light');
            document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.nav-btn').classList.add('active');
        }
        
        // Regenerate office
        function regenerateOffice() {
            haptic('heavy');
            if (tg) {
                tg.showPopup({
                    title: 'Генерация нового фона',
                    message: 'Создать новое изображение офиса?',
                    buttons: [
                        {id: 'yes', type: 'default', text: 'Да'},
                        {id: 'no', type: 'cancel', text: 'Отмена'}
                    ]
                }, (btn) => {
                    if (btn === 'yes') {
                        tg.showAlert('🎨 Генерация запущена...');
                    }
                });
            } else {
                alert('🎨 Здесь будет генерация нового фона');
            }
        }
        
        // Thoughts rotation
        const thoughts = [
            "Анализирую данные VNVNC...",
            "Проверяю рекламные кампании",
            "Мониторю конкурентов 👁️",
            "Все системы работают нормально ✅",
            "Нужно обновить отчёт по метрикам",
            "Готова к новым задачам! ⚡"
        ];
        let tIndex = 0;
        setInterval(() => {
            tIndex = (tIndex + 1) % thoughts.length;
            document.getElementById('thought-text').textContent = thoughts[tIndex];
        }, 5000);
        
        // Render skills with categories
        let skillsRendered = false;
        function renderSkills() {
            if (skillsRendered) return;
            
            const container = document.getElementById('skills-content');
            const data = (typeof allSkillsFromRepo !== 'undefined') ? allSkillsFromRepo : [];
            const installed = (typeof installedSkillNames !== 'undefined') ? installedSkillNames : [];
            
            // Group by category
            const groups = {};
            data.forEach(s => {
                if (!groups[s.category]) groups[s.category] = [];
                groups[s.category].push(s);
            });
            
            // Installed first
            const installedSkills = data.filter(s => installed.includes(s.name));
            if (installedSkills.length > 0) {
                const header = document.createElement('div');
                header.className = 'category-title installed';
                header.textContent = '✅ Установленные (' + installedSkills.length + ')';
                container.appendChild(header);
                
                const grid = document.createElement('div');
                grid.className = 'skills-grid';
                installedSkills.forEach(s => grid.appendChild(createSkillCard(s, true)));
                container.appendChild(grid);
            }
            
            // Other categories
            Object.keys(groups).forEach(cat => {
                const catSkills = groups[cat].filter(s => !installed.includes(s.name));
                if (catSkills.length === 0) return;
                
                const header = document.createElement('div');
                header.className = 'category-title';
                header.textContent = cat + ' (' + catSkills.length + ')';
                container.appendChild(header);
                
                const grid = document.createElement('div');
                grid.className = 'skills-grid';
                catSkills.forEach(s => grid.appendChild(createSkillCard(s, false)));
                container.appendChild(grid);
            });
            
            skillsRendered = true;
        }
        
        function createSkillCard(skill, isInstalled) {
            const card = document.createElement('div');
            card.className = 'skill-card' + (isInstalled ? ' installed' : '');
            card.innerHTML = `
                <div class="skill-name" style="${isInstalled ? 'color:#00ff88' : ''}">${skill.icon || '📦'} ${skill.name}</div>
                <div class="skill-desc">${skill.desc || 'Нет описания'}</div>
            `;
            card.onclick = () => {
                haptic('light');
                if (tg) tg.showPopup({title: skill.name, message: skill.desc || 'Нет описания'});
            };
            return card;
        }
        
        // Notes
        const NOTES_KEY = 'klavdia_notes_v8';
        document.getElementById('notes-area').value = localStorage.getItem(NOTES_KEY) || '';
        function saveNotes() {
            localStorage.setItem(NOTES_KEY, document.getElementById('notes-area').value);
            haptic('medium');
            if (tg) tg.showAlert('✅ Сохранено!');
            else alert('Сохранено!');
        }
        
        // Back button
        if (tg) {
            tg.BackButton.onClick(() => {
                closeAll();
            });
        }
    </script>
</body>
</html>
